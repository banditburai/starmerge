name: 🚀 Release to PyPI and GitHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-validate:
    name: 🏗️ Build and Validate Package
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --group dev

    - name: Ruff check
      run: uv run ruff check .

    - name: Ruff format check
      run: uv run ruff format --check .

    - name: Pyright
      run: uv run pyright

    - name: Run tests
      run: uv run pytest tests/ -q --tb=short

    - name: Validate pyproject.toml
      run: |
        uv pip install validate-pyproject --python $(uv python find)
        uv run validate-pyproject pyproject.toml

    - name: Build package
      run: uv build

    - name: Validate package contents
      run: |
        uv pip install check-wheel-contents --python $(uv python find)
        uv run check-wheel-contents dist/*.whl --ignore W004

    - name: Test package installation
      run: |
        uv venv /tmp/test-install
        uv pip install dist/*.whl --python /tmp/test-install/bin/python
        /tmp/test-install/bin/python -c "import starmerge; print(f'starmerge {starmerge.__version__} installed successfully')"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
        retention-days: 7

  publish-to-testpypi:
    name: 🧪 Publish to TestPyPI
    needs: [build-and-validate]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/starmerge
    permissions:
      id-token: write

    steps:
    - name: Download package distributions
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        print-hash: true

  publish-to-pypi:
    name: 🚀 Publish to PyPI
    needs: [build-and-validate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/starmerge
    permissions:
      id-token: write
      contents: write

    steps:
    - name: Download package distributions
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true

  create-github-release:
    name: 📋 Create GitHub Release
    needs: [publish-to-pypi]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download package distributions
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Create GitHub Release
      run: |
        prerelease_flag=""
        if [[ "${{ github.ref_name }}" =~ -alpha|-beta|-rc ]]; then
          prerelease_flag="--prerelease"
        else
          prerelease_flag="--latest"
        fi
        gh release create "${{ github.ref_name }}" \
          --title "StarMerge ${{ github.ref_name }}" \
          --generate-notes \
          $prerelease_flag \
          dist/*
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
